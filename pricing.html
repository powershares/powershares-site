<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PowerShares | Pricing</title>
  <style>
    :root{
      --bg:#f3f3f5;
      --white:#ffffff;
      --text:#1e2740;
      --muted:#5d6880;
      --navy:#233a66;
      --line:#d8deea;
      --shadow:0 10px 24px rgba(20,35,60,.05);
      --blue-accent:#1807f7;
      --hero-box-blue:rgba(24,7,247,.06);
      --price-band:linear-gradient(135deg, #1b2f4f 0%, #2c4872 100%);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.85;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    header{
      background:rgba(255,255,255,.96);
      border-bottom:1px solid var(--line);
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(8px);
    }

    .nav{
      width:min(1680px,98%);
      margin:0 auto;
      min-height:52px;
      padding:8px 0;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:14px;
    }

    .top-link{
      color:#5a6780;
      font-size:.95rem;
    }

    .top-link:hover{
      color:var(--navy);
    }

    .lang-switch{
      display:flex;
      gap:8px;
      transform:scale(.8);
      transform-origin:right center;
    }

    .lang-switch button{
      background:#fff;
      color:var(--navy);
      border:1px solid #ccd4e2;
      border-radius:999px;
      padding:8px 15px;
      cursor:pointer;
      font-weight:700;
      font-size:.95rem;
    }

    .lang-switch button.active{
      background:var(--navy);
      color:#fff;
      border-color:var(--navy);
    }

    .hero-band{
      width:100%;
      min-height:215px;
      background:var(--price-band);
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .hero-band-inner{
      width:min(1320px,96%);
      margin:0 auto;
      min-height:215px;
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:26px 24px 20px;
    }

    .hero-brand{
      position:absolute;
      left:8px;
      top:28px;
      color:#fff;
      font-size:.9rem;
      font-weight:800;
      letter-spacing:0;
    }

    .hero-title{
      margin:0;
      color:#fff;
      text-align:center;
      font-family:Arial, Helvetica, sans-serif;
      font-size:clamp(1.2rem,2.4vw,1.8rem);
      font-weight:800;
      line-height:1.08;
      letter-spacing:-.01em;
    }

    .container{
      width:min(1260px,92%);
      margin:0 auto;
      padding:28px 0 40px;
    }

    .hero-main{
      width:100%;
      background:var(--hero-box-blue);
      border:1px solid var(--line);
      border-radius:16px;
      padding:22px 22px 18px;
      box-shadow:var(--shadow);
      margin-bottom:28px;
    }

    .hero-main h1{
      margin:0 0 12px;
      font-size:2rem;
      line-height:1.1;
      font-weight:800;
      color:var(--text);
    }

    .lead{
      margin:0;
      color:var(--muted);
      font-size:.96rem;
      line-height:1.9;
      max-width:100%;
    }

    section{
      padding:10px 0 18px;
    }

    .section-title-plain{
      margin:0 0 14px;
      font-size:2rem;
      font-weight:800;
      color:var(--text);
      line-height:1.1;
    }

    .grid{
      display:grid;
      gap:18px;
    }

    .grid-3{
      grid-template-columns:repeat(3,minmax(0,1fr));
    }

    .grid-2{
      grid-template-columns:repeat(2,minmax(0,1fr));
    }

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:22px;
      box-shadow:0 4px 14px rgba(20,35,60,.03);
    }

    .price-card{
      background:var(--price-band);
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
    }

    .price-card h3{
      color:#fff;
      margin:0 0 18px;
      font-size:1.02rem;
      font-weight:800;
      min-height:78px;
    }

    .price{
      font-size:3rem;
      font-weight:800;
      line-height:1;
      color:#fff;
      margin:0 0 18px;
      min-height:48px;
      display:flex;
      align-items:center;
    }

    .price-card .sub{
      color:rgba(255,255,255,.82);
      font-size:.95rem;
      margin:0 0 14px;
      min-height:38px;
    }

    .price-card ul{
      margin:0;
      padding-left:22px;
      color:rgba(255,255,255,.9);
      font-size:.96rem;
      line-height:1.9;
    }

    .option-card h3,
    .contact-box h3{
      margin:0 0 18px;
      font-size:1.05rem;
      font-weight:800;
      color:var(--navy);
    }

    .option-card .price{
      color:var(--navy);
      margin-bottom:14px;
      min-height:auto;
    }

    .option-card .sub{
      color:var(--muted);
      font-size:.95rem;
      margin:0 0 12px;
    }

    .option-card ul{
      margin:0;
      padding-left:22px;
      color:var(--muted);
      font-size:.96rem;
      line-height:1.9;
    }

    .mini-note{
      margin-top:12px;
      font-size:.82rem;
      line-height:1.7;
      color:#43506a;
    }
